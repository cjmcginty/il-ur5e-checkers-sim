services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ur5e_checkers_dev
    user: "1000:1000"
    tty: true
    stdin_open: true

    # Mount your repo into the container
    volumes:
      - .:/workspaces/ur5e-checkers-irl:cached
      - /mnt/wslg:/mnt/wslg
      - /tmp/.X11-unix:/tmp/.X11-unix

    # For ROS 2 discovery within the container/network
    environment:
      - ROS_DOMAIN_ID=42
      - GZ_SIM_SYSTEM_PLUGIN_PATH=/opt/ros/jazzy/lib
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - PULSE_SERVER=${PULSE_SERVER}
      - QT_X11_NO_MITSHM=1

    # If you later need host ↔ container ROS comms, we can adjust networking.
